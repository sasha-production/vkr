---
- name: Check if swarm is already initialized
  command: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
  register: swarm_status
  changed_when: false
  failed_when: false

- name: Initialize Docker Swarm
  command: docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}
  register: swarm_init
  when: swarm_status.stdout != "active"
  failed_when: false

- name: Display swarm initialization result
  debug:
    msg: "Swarm initialized successfully"
  when: swarm_init is defined and swarm_init.rc == 0

- name: Extract join token for workers
  shell: docker swarm join-token worker -q
  register: worker_token
  changed_when: false
  when: swarm_init is defined and swarm_init.rc == 0

- name: Set join command fact
  set_fact:
    worker_join_command: "docker swarm join --token {{ worker_token.stdout }} {{ ansible_default_ipv4.address }}:2377"
    cacheable: yes
  when: worker_token.stdout is defined

- name: Display join command for workers
  debug:
    msg: "Worker join command: {{ worker_join_command }}"
  when: worker_join_command is defined
