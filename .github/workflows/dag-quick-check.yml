name: Quick DAG Check
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'
env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🔎 The name of branch is ${{ github.ref }} and repository is ${{ github.repository }}."
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install tools
        run: |
          pip install flake8 black bandit
      
      - name: Check formatting
        run: black --check dags/
      
      - name: Lint
        run: flake8 dags/ --max-line-length=120 --count --statistics
      
      - name: Security scan
        run: bandit -r dags/ -ll
      - run: echo "🍏 This job's status is ${{ job.status }}."
