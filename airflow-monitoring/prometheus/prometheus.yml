global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'airflow-swarm'
    environment: 'production'

# Правила алертинга
rule_files:
  - 'alerts.yml'

# Конфигурация алертинга
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Настройка сбора метрик
scrape_configs:
  # Метрики самого Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          node: 'prometheus'

  # Метрики Docker Swarm нод через node-exporter
  - job_name: 'node-exporter'
    dns_sd_configs:
      - names:
          - 'tasks.node-exporter'
        type: 'A'
        port: 9100
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*'
        target_label: instance
        replacement: '${1}'
      - source_labels: [__meta_docker_swarm_node_id]
        target_label: node_id
      - source_labels: [__meta_docker_swarm_node_hostname]
        target_label: node_name

  # Метрики контейнеров через cAdvisor
  - job_name: 'cadvisor'
    dns_sd_configs:
      - names:
          - 'tasks.cadvisor'
        type: 'A'
        port: 8088  # Изменяем порт на новый
    relabel_configs:
      - source_labels: [__meta_docker_swarm_node_id]
        target_label: node_id
      - source_labels: [__meta_docker_swarm_node_hostname]
        target_label: node_name
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name
      - source_labels: [__meta_docker_container_label_com_docker_swarm_service_name]
        target_label: swarm_service

  # Метрики Airflow (нужно включить в Airflow)
  - job_name: 'airflow'
    static_configs:
      - targets: ['statsd-exporter:9102']
        labels:
          service: 'airflow'
          component: 'all'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
  # Метрики Postgres
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'

  # Метрики Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # Метрики Traefik (если используете)
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']
        labels:
          service: 'traefik'
  # StatsD Exporter (метрики Airflow)
  - job_name: 'statsd-exporter'
    static_configs:
      - targets: ['statsd-exporter:9102']
        labels:
          service: 'airflow-metrics'

